<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>売れている本ランキング</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:"Noto Serif JP",serif;
padding:30px;
}

.title{
font-size:28px;
text-align:center;
margin-bottom:30px;
letter-spacing:2px;
color:#f5e6c8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:24px;
}

.book{
background:#1a1a1a;
padding:12px;
border-radius:12px;
text-align:center;
transition:transform .3s;
}

.book:hover{
transform:translateY(-5px);
}

.rank{
font-size:14px;
color:#f5e6c8;
margin-bottom:6px;
}

.book img{
width:100%;
height:200px;
object-fit:contain;
background:white;
border-radius:6px;
}

.name{
font-size:13px;
margin-top:8px;
height:36px;
overflow:hidden;
}

.author{
font-size:11px;
color:#aaa;
margin-top:4px;
}

.btn{
display:inline-block;
margin-top:8px;
padding:6px 12px;
background:#5a4632;
border-radius:20px;
color:white;
text-decoration:none;
font-size:12px;
}

.btn:hover{
background:#7b6249;
}

</style>
</head>

<body>

<div class="title">📈 今売れている本</div>

<div class="grid" id="books"></div>

<script>

const APP_ID="8c682462-b116-430e-a3ef-7da6a88ac3f8"

const url=`https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?applicationId=${APP_ID}&sort=sales&size=10`

fetch(url)
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("books")

data.Items.forEach((item,i)=>{

const book=item.Item

const div=document.createElement("div")
div.className="book"

div.innerHTML=`

<div class="rank">${i+1}位</div>

<img src="${book.largeImageUrl}">

<div class="name">${book.title}</div>

<div class="author">${book.author}</div>

<a class="btn" href="${book.itemUrl}" target="_blank">
詳細
</a>

`

container.appendChild(div)

})

})

</script>

</body>
</html>
